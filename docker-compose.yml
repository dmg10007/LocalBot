# LocalBot — full stack
# Starts the Discord bot, the OpenWebUI API bridge, and OpenWebUI itself.
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your values.
#   2. Place your GGUF model file(s) in a local folder and set
#      SLOT_*_MODEL paths to match the container path (see volumes below).
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f        # stream logs
#   docker compose down           # stop and remove containers

services:

  # ── LocalBot (Discord bot + background scheduler) ──────────────────────────
  localbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localbot
    restart: unless-stopped
    env_file: .env
    volumes:
      # Model files — adjust the left side to your actual model directory.
      - C:\Llama\Models:/models:ro
      # Persistent storage (SQLite, audit log, sandbox workspace)
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./sandbox:/app/sandbox
      # llama-server binary — mount the folder that contains llama-server.exe
      - C:\llama:/llama:ro
    environment:
      LLAMA_SERVER_EXECUTABLE: /llama/llama-server.exe
      # Bind on all interfaces inside the container.
      LLAMA_SERVER_HOST: 0.0.0.0
      # But connect via loopback — 0.0.0.0 is a bind addr, not routable.
      LLAMA_SERVER_CLIENT_HOST: 127.0.0.1
    networks:
      - localbot-net

  # ── LocalBot WebUI API bridge ───────────────────────────────────────────────
  localbot-webui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRA: webui
    container_name: localbot-webui
    restart: unless-stopped
    env_file: .env
    command: ["python", "-m", "localbot.webui"]
    ports:
      - "8080:8080"
    environment:
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: "8080"
      LLAMA_SERVER_EXECUTABLE: /llama/llama-server.exe
      # Bind llama-server on all interfaces.
      LLAMA_SERVER_HOST: 0.0.0.0
      # Connect to llama-server via loopback.
      LLAMA_SERVER_CLIENT_HOST: 127.0.0.1
      # Separate port range so webui's llama-server doesn't collide
      # with localbot's ports (8080-8082).
      SLOT_GENERAL_PORT: "8090"
      SLOT_CODING_PORT: "8091"
      SLOT_REASONING_PORT: "8092"
    volumes:
      - C:\Llama\Models:/models:ro
      - C:\llama:/llama:ro
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - localbot
    networks:
      - localbot-net

  # ── OpenWebUI ───────────────────────────────────────────────────────────────
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: http://localbot-webui:8080/v1
      OPENAI_API_KEY: ${WEBUI_API_KEY:-localbot}
      ENABLE_OLLAMA_API: "false"
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - localbot-webui
    networks:
      - localbot-net

volumes:
  openwebui-data:

networks:
  localbot-net:
    driver: bridge
