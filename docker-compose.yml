# LocalBot — full stack
# Starts the Discord bot, the OpenWebUI API bridge, and OpenWebUI itself.
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your values.
#   2. Place your GGUF model file(s) in a local folder and set
#      SLOT_*_MODEL paths to match the container path (see volumes below).
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f        # stream logs
#   docker compose down           # stop and remove containers

services:

  # ── LocalBot (Discord bot + background scheduler) ────────────────────────
  localbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localbot
    restart: unless-stopped
    env_file: .env
    volumes:
      - C:\Llama\Models:/models:ro
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./sandbox:/app/sandbox
    environment:
      # Use the Linux binary baked into the image — no Windows .exe needed.
      LLAMA_SERVER_EXECUTABLE: /usr/local/bin/llama-server
      LLAMA_SERVER_HOST: 0.0.0.0
      LLAMA_SERVER_CLIENT_HOST: 127.0.0.1
    networks:
      - localbot-net

  # ── LocalBot WebUI API bridge ────────────────────────────────────────
  localbot-webui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRA: webui
    container_name: localbot-webui
    restart: unless-stopped
    env_file: .env
    command: ["python", "-m", "localbot.webui"]
    ports:
      - "8080:8080"
    environment:
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: "8080"
      # Remote mode: forward requests to localbot's llama-server over the
      # Docker bridge network instead of spawning a subprocess.
      LLAMA_REMOTE_HOST: localbot
      LLAMA_REMOTE_PORT: "8080"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - localbot
    networks:
      - localbot-net

  # ── GitHub MCP Server ───────────────────────────────────────────────────
  # Exposes the official GitHub MCP server over HTTP so
  # OpenWebUI can connect to it natively via Settings → Tools → MCP.
  # Connect OpenWebUI to: http://github-mcp-server:8181/mcp (Bearer token)
  github-mcp-server:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: github-mcp-server
    restart: unless-stopped
    command: ["http", "--port", "8181"]
    ports:
      - "8181:8181"
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
    networks:
      - localbot-net

  # ── OpenWebUI ───────────────────────────────────────────────────────────
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      # --- Connection ---
      OPENAI_API_BASE_URL: http://localbot-webui:8080/v1
      OPENAI_API_KEY: ${WEBUI_API_KEY:-localbot}

      # --- Auth: single-user, lock it down ---
      ENABLE_SIGNUP: "false"
      ENABLE_OLLAMA_API: "false"
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD}
      DEFAULT_USER_ROLE: pending

      # --- Model defaults ---
      DEFAULT_MODELS: localbot-general
      DEFAULT_PINNED_MODELS: localbot-general
      ENABLE_TITLE_GENERATION: "false"
      ENABLE_FOLLOW_UP_GENERATION: "false"

      # --- Performance ---
      AIOHTTP_CLIENT_TIMEOUT: "300"
      AIOHTTP_CLIENT_TIMEOUT_MODEL_LIST: "30"
      CHAT_RESPONSE_STREAM_DELTA_CHUNK_SIZE: "3"
      ENABLE_REALTIME_CHAT_SAVE: "false"

      # --- Disable unused features ---
      BYPASS_MODEL_ACCESS_CONTROL: "true"

      # --- Branding ---
      WEBUI_NAME: LocalBot

      # --- Config management: docker-compose.yml is source of truth ---
      ENABLE_PERSISTENT_CONFIG: "false"
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - localbot-webui
      - github-mcp-server
    networks:
      - localbot-net

volumes:
  openwebui-data:

networks:
  localbot-net:
    driver: bridge
