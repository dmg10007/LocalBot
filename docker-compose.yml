# LocalBot — full stack (tuned for i5-10400H, 16 GB RAM, no discrete GPU)
#
# Resource budget (leaving ~4 GB for Windows + Docker Desktop overhead):
#   localbot          → 8 GB RAM, 4 CPU cores  (llama-server is the heavy lifter)
#   localbot-webui    → 512 MB RAM, 1 CPU core
#   github-mcp-server → 256 MB RAM, 0.5 CPU core
#   openwebui         → 1 GB RAM, 1 CPU core
#   -------------------------------------------------
#   Total reserved    → ~9.75 GB / 6.5 cores
#
# llama.cpp tuning (CPU-only, i5-10400H — 4 physical cores / 8 threads, AVX2, DDR4-2933 DC):
#
#   Token generation is memory-bandwidth-bound → use physical cores only (THREADS=4).
#   Prompt evaluation is more compute-bound → HT helps, use all logical threads (THREADS_BATCH=8).
#
#   - LLAMA_ARG_N_GPU_LAYERS=0       → DO NOT change. Intel UHD shares system RAM; Vulkan
#                                       offloading uses the same DDR4 bus and adds driver
#                                       overhead, resulting in slower tok/s on this iGPU.
#   - LLAMA_ARG_THREADS=4            → physical cores for token generation (memory-bound)
#   - LLAMA_ARG_THREADS_BATCH=8      → all logical threads for prompt eval (compute-bound)
#   - LLAMA_ARG_CTX_SIZE=2048        → halves KV cache vs 4096; raises to 4096 via LLAMA_CTX_SIZE
#                                       if you need longer context
#   - LLAMA_ARG_N_PARALLEL=1         → single concurrent request; no gain without GPU
#   - LLAMA_ARG_BATCH_SIZE=512       → prompt eval chunk size; matches ubatch-size below
#   - LLAMA_ARG_MLOCK=false          → let OS manage paging; mlock on 16 GB is risky
#   - LLAMA_ARG_MMAP=true            → memory-map model file; fast cold start, lower RSS
#
# Extra args passed via LLAMA_SERVER_EXTRA_ARGS (set in .env or override here):
#   --flash-attn                     → O(n) attention memory vs O(n²); cuts TTFT ~15-25% for
#                                       accumulated history; required for ctx > 2048
#   --cache-type-k q8_0              → 8-bit KV key cache; frees ~200-500 MB RAM vs fp16
#   --cache-type-v q8_0              → 8-bit KV value cache; negligible quality delta
#   --ubatch-size 512                → micro-batch for parallel prompt evaluation
#   --model-draft /models/<draft>    → speculative decoding draft model (optional);
#                                       0.5B-1B model adds ~1.5-2x effective tok/s
#   --draft-max 5                    → max speculative tokens per step

services:

  # ── LocalBot (Discord bot + llama-server subprocess) ─────────────────────
  localbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localbot
    restart: unless-stopped
    env_file: .env
    volumes:
      - C:\\Llama\\Models:/models:ro
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./sandbox:/app/sandbox
    environment:
      LLAMA_SERVER_EXECUTABLE: /usr/local/bin/llama-server
      LLAMA_SERVER_HOST: 0.0.0.0
      LLAMA_SERVER_CLIENT_HOST: 127.0.0.1
      # ── llama.cpp inference tuning ────────────────────────────────
      LLAMA_ARG_N_GPU_LAYERS: "0"
      LLAMA_ARG_THREADS: "4"
      LLAMA_ARG_THREADS_BATCH: "8"
      LLAMA_ARG_CTX_SIZE: "${LLAMA_CTX_SIZE:-2048}"
      LLAMA_ARG_BATCH_SIZE: "512"
      LLAMA_ARG_N_PARALLEL: "1"
      LLAMA_ARG_MLOCK: "false"
      LLAMA_ARG_MMAP: "true"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 5G
    networks:
      - localbot-net

  # ── LocalBot WebUI API bridge ──────────────────────────────────
  localbot-webui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRA: webui
    container_name: localbot-webui
    restart: unless-stopped
    env_file: .env
    command: ["python", "-m", "localbot.webui"]
    ports:
      - "8090:8090"
    environment:
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: "8090"
      LLAMA_REMOTE_HOST: localbot
      LLAMA_REMOTE_PORT: "8080"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - localbot
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - localbot-net

  # ── GitHub MCP Server ───────────────────────────────────────
  github-mcp-server:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: github-mcp-server
    restart: unless-stopped
    # --host is not supported; the server binds to 0.0.0.0 by default
    command: ["http", "--port", "8181"]
    ports:
      - "8181:8181"
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - localbot-net

  # ── OpenWebUI ─────────────────────────────────────────────
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: http://localbot-webui:8090/v1
      OPENAI_API_KEY: ${WEBUI_API_KEY:?WEBUI_API_KEY must be set in .env}
      ENABLE_OLLAMA_API: "false"
      # Reduce OpenWebUI background worker threads — it defaults to 8
      UVICORN_WORKERS: "1"
      # Disable automatic web search — Open WebUI v0.9.6 has a bug in
      # chat_web_search_handler (middleware.py:1536) where it tries to subscript
      # a StreamingResponse as a dict, causing a TypeError on every chat request
      # that triggers web search. Disabling at the env level is cleaner than
      # patching the upstream image.
      ENABLE_RAG_WEB_SEARCH: "false"
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - localbot-webui
      - github-mcp-server
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    networks:
      - localbot-net

volumes:
  openwebui-data:

networks:
  localbot-net:
    driver: bridge
